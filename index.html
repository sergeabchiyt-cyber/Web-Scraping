<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDITOR | Strategic Extraction Terminal</title>
    <style>
        :root {
            --bg-base: #0a0a0b; --bg-panel: #121214; --bg-input: #1a1a1c;
            --border-subtle: #27272a; --border-focus: #52525b;
            --text-primary: #f4f4f5; --text-secondary: #a1a1aa; --text-muted: #52525b;
            --accent-blue: #3b82f6; --accent-green: #10b981; --accent-red: #ef4444;
            --accent-orange: #f59e0b; --font-mono: "JetBrains Mono", "SF Mono", monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-base); color: var(--text-primary); font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; font-size: 13px; }
        .sidebar { width: 320px; background-color: var(--bg-panel); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .brand { padding: 20px; border-bottom: 1px solid var(--border-subtle); font-family: var(--font-mono); font-weight: 600; display: flex; justify-content: space-between; }
        .control-panel { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        input[type="text"] { background: var(--bg-input); border: 1px solid var(--border-subtle); color: var(--text-primary); padding: 8px 12px; font-family: var(--font-mono); border-radius: 4px; outline: none; }
        .btn { padding: 10px; border: 1px solid var(--border-subtle); background: var(--bg-input); color: var(--text-primary); font-weight: 600; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); }
        .log-container { flex: 1; border-top: 1px solid var(--border-subtle); background: var(--bg-base); padding: 12px; font-family: var(--font-mono); font-size: 11px; overflow-y: auto; color: var(--text-secondary); }
        .header { height: 57px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-panel); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .metrics { display: flex; gap: 16px; font-family: var(--font-mono); font-size: 11px; }
        .view-container { flex: 1; overflow: auto; background: var(--bg-base); padding: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: var(--bg-panel); padding: 10px; text-align: left; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); }
        .data-table td { padding: 10px; border-bottom: 1px solid var(--border-subtle); font-family: var(--font-mono); }
        .active-js { color: var(--accent-blue); font-weight: bold; }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="brand"><span>AUDITOR</span><span style="color:var(--text-muted)">v7.8.0</span></div>
    <div class="control-panel">
        <div class="input-group">
            <label style="font-size:11px; color:var(--text-secondary)">TARGET URI</label>
            <input type="text" id="url-input" value="https://tradingeconomics.com/calendar">
        </div>
        <div class="input-group">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" id="js-check"> <span style="font-size:12px">JS Execution Context</span>
            </label>
        </div>
        <button class="btn btn-primary" id="run-btn">Execute Extraction</button>
        <button class="btn" id="dl-btn" style="color:var(--text-secondary)" disabled>Export JSON</button>
    </div>
    <div class="log-container" id="log-box">
        <div>[SYSTEM] Initialized. Awaiting objective.</div>
    </div>
</aside>
<main class="main-content">
    <header class="header">
        <div style="font-weight:bold">Data Output</div>
        <div class="metrics">
            <div>VOL: <span id="m-vol" style="color:var(--accent-blue)">0</span></div>
            <div>TIME: <span id="m-time" style="color:var(--accent-green)">0.00s</span></div>
        </div>
    </header>
    <div class="view-container" id="output-view">
        <div style="color:var(--text-muted); font-family:var(--font-mono)">No active records in memory.</div>
    </div>
</main>

<script>
    const el = id => document.getElementById(id);
    let sessionData = [];

    function log(msg, color = 'var(--text-secondary)') {
        const div = document.createElement('div');
        div.style.color = color;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        el('log-box').prepend(div);
    }

    el('run-btn').addEventListener('click', async () => {
        const url = el('url-input').value;
        const js = el('js-check').checked;
        const start = performance.now();

        el('run-btn').disabled = true;
        el('run-btn').textContent = "EXTRACTING...";
        log(`Initiating request to ${url}...`, 'var(--accent-blue)');

        try {
            const response = await fetch('/execute_extraction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_url: url, js_rendering: js })
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.detail || 'Extraction failed');

            sessionData = result.data || result.events || [];
            renderTable(sessionData);
            
            el('m-vol').textContent = sessionData.length;
            el('m-time').textContent = ((performance.now() - start) / 1000).toFixed(2) + 's';
            el('dl-btn').disabled = false;
            log(`Success: ${sessionData.length} records retrieved.`, 'var(--accent-green)');
        } catch (err) {
            log(`ERROR: ${err.message}`, 'var(--accent-red)');
        } finally {
            el('run-btn').disabled = false;
            el('run-btn').textContent = "Execute Extraction";
        }
    });

    function renderTable(data) {
        if (!data.length) return;
        const keys = Object.keys(data[0]);
        let html = `<table class="data-table"><thead><tr>`;
        keys.forEach(k => html += `<th>${k.toUpperCase()}</th>`);
        html += `</tr></thead><tbody>`;
        data.forEach(row => {
            html += `<tr>`;
            keys.forEach(k => html += `<td>${row[k] || '-'}</td>`);
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        el('output-view').innerHTML = html;
    }

    el('dl-btn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(sessionData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `audit_export_${Date.now()}.json`;
        a.click();
    });
</script>
</body>
</html>
